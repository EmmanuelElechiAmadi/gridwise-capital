<!DOCTYPE html>
<html>
<head>
    <title>GridWise Capital Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .metrics { display: flex; gap: 15px; }
        .metric { background: white; padding: 20px; border-radius: 8px; min-width: 150px; }
        .value { font-size: 24px; font-weight: bold; }
        .chart-container { width: 100%; margin-top: 20px; }
        .controls { margin: 20px 0; display: flex; gap: 10px; align-items: center; }
        .controls button, .controls a { text-decoration: none; }
        #logPanel { height: 200px; overflow-y: scroll; background: #222; color: #0f0; padding: 10px; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>⚡ GridWise Capital</h1>

    <!-- Metrics row (unchanged) -->
    <div class="metrics">
        <div class="metric">Balance <div class="value" id="balance">0</div></div>
        <div class="metric">Equity <div class="value" id="equity">0</div></div>
        <div class="metric">P&L <div class="value" id="pnl">0</div></div>
        <div class="metric">Net Pos (oz) <div class="value" id="net">0</div></div>
        <div class="metric">Orders <div class="value" id="orders">0</div></div>
    </div>

    <!-- Controls -->
    <div class="controls" style="margin:20px 0;">
        <button onclick="startBot()" style="background:green; color:white; padding:10px;">▶ Start</button>
        <button onclick="stopBot()" style="background:red; color:white; padding:10px;">⏹ Stop</button>
        <label>Spacing: <input type="text" id="spacingInput" value="0.1" size="5"></label>
        <label>Levels: <input type="text" id="levelsInput" value="5" size="3"></label>
        <button onclick="updateParams()" style="padding:10px;">Update Params</button>
        <button onclick="resetGrid()" style="padding:10px;">🔄 Reset Grid</button>
        <button onclick="closeAll()" style="background:darkred; color:white; padding:10px;">⚠️ Close All</button>
        <a href="/export_trades" target="_blank" style="margin-left:20px;">📥 Export Trades (CSV)</a>
    </div>

    <!-- Equity Chart (existing) -->
    <div class="chart-container" id="equityChart"></div>

    <!-- Live P&L chart -->
    <div class="chart-container" id="pnlChart"></div>

    <!-- Session performance table -->
    <div id="sessionTable"></div>

    <!-- Log panel -->
    <div id="logPanel">
        <div id="logContent"></div>
    </div>

    <script>
        const socket = io();

        // ----- Existing metrics update -----
        socket.on('update', (data) => {
            document.getElementById('balance').innerText = '$'+data.balance.toFixed(2);
            document.getElementById('equity').innerText = '$'+data.equity.toFixed(2);
            document.getElementById('pnl').innerText = '$'+data.pnl.toFixed(2);
            document.getElementById('net').innerText = data.net_position.toFixed(2);
            document.getElementById('orders').innerText = data.num_orders;

            // Update live P&L chart
            updatePnlChart(data.pnl);
        });

        // ----- Live P&L chart -----
        let pnlHistory = [];
        Plotly.newPlot('pnlChart', [{
            y: [],
            type: 'scatter',
            mode: 'lines+markers',
            name: 'P&L',
            line: {color: 'blue'}
        }], {
            title: 'Real-Time P&L',
            xaxis: {title: 'Time'},
            yaxis: {title: 'P&L ($)'}
        });

        function updatePnlChart(pnl) {
            pnlHistory.push(pnl);
            if (pnlHistory.length > 50) pnlHistory.shift(); // keep last 50 points
            Plotly.update('pnlChart', { y: [pnlHistory] });
        }

        // ----- Risk Alert Notifications -----
        socket.on('risk_alert', (data) => {
            alert('⚠️ ' + data.message);
            if (Notification.permission === "granted") {
                new Notification("Risk Alert", { body: data.message });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(perm => {
                    if (perm === "granted") {
                        new Notification("Risk Alert", { body: data.message });
                    }
                });
            }
        });

        // ----- Control Functions -----
        function startBot()  { fetch('/start_strategy', {method:'POST'}); }
        function stopBot()   { fetch('/stop_strategy', {method:'POST'}); }
        function updateParams() {
            const spacing = document.getElementById('spacingInput').value;
            const levels  = document.getElementById('levelsInput').value;
            fetch('/update_params', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({spacing, levels})
            });
        }
        function resetGrid()  { fetch('/reset_grid', {method:'POST'}); }
        function closeAll()   { 
            if (confirm('Close ALL positions and cancel ALL orders?')) {
                fetch('/close_all', {method:'POST'});
            }
        }

        // ----- Existing equity chart & session table (unchanged) -----
        function fetchEquity() {
            fetch('/equity_chart').then(r=>r.json()).then(d=>{
                Plotly.newPlot('equityChart', [{x:d.map(p=>p.x), y:d.map(p=>p.y), type:'scatter', mode:'lines', name:'Equity'}], {title:'Equity Curve'});
            });
        }
        function fetchSessions() {
            fetch('/session_stats').then(r=>r.json()).then(d=>{
                let html = '<h3>Session Performance</h3><table border=1>';
                if(d.length>0){ html += '<tr>'+Object.keys(d[0]).map(k=>`<th>${k}</th>`).join('')+'</tr>'; }
                d.forEach(r=>{ html += '<tr>'+Object.values(r).map(v=>`<td>${v}</td>`).join('')+'</tr>'; });
                html += '</table>';
                document.getElementById('sessionTable').innerHTML = html;
            });
        }
        setInterval(fetchEquity, 10000); fetchEquity();
        setInterval(fetchSessions, 15000); fetchSessions();

        // ----- Log -----
        socket.on('log', (msg) => {
            const logDiv = document.getElementById('logContent');
            logDiv.innerHTML += '<div>' + msg + '</div>';
            document.getElementById('logPanel').scrollTop = document.getElementById('logPanel').scrollHeight;
        });
    </script>
</body>
</html>
